name: C build and tests

on:
  push:
  pull_request:

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install compiler, MPI, and FFTW
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libfftw3-dev \
            libfftw3-mpi-dev \
            libopenmpi-dev \
            openmpi-bin

      - name: Build single-host and hybrid MPI programs
        run: |
          make CFLAGS="-O2 -std=c11 -Wall -Wextra -Wpedantic -Werror -fopenmp"
          make mpi CFLAGS="-O2 -std=c11 -Wall -Wextra -Wpedantic -Werror -fopenmp"

      - name: Run single-host quick test
        working-directory: example
        run: |
          ../polygr quick1 quick2 --xyz quick.xyz --threads 2
          test "$(head -n 1 quick.xyz)" -gt 0
          grep -q 'Properties="id:I:1:species:S:1:pos:R:3:coordination:I:1:ring0:I:1:ring1:I:1:ring2:I:1:gb:I:1:Radius:R:1:Color:R:3"' quick.xyz

      - name: Run two-rank hybrid MPI quick test
        working-directory: example
        run: |
          mpirun -np 2 ../polygr_mpi quick1 quick2 \
            --xyz quick-mpi.xyz \
            --threads 2
          test "$(head -n 1 quick-mpi.xyz)" -gt 0
          grep -q 'Properties="id:I:1:species:S:1:pos:R:3:coordination:I:1:ring0:I:1:ring1:I:1:ring2:I:1:gb:I:1:Radius:R:1:Color:R:3"' quick-mpi.xyz
